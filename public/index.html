<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BharatQR - Zero Cost UPI Payment Matrix</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9fafb; color: #111827; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #000; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
        .badge { background: #e0f2fe; color: #0369a1; padding: 4px 8px; border-radius: 6px; font-size: 0.85em; font-weight: bold; }
    </style>
</head>
<body>
    <h1>BharatQR Programmatic SEO Hub</h1>
    <p>Live merchant landing pages generated dynamically by your automated scraper.</p>
    
    <div id="seo-routes">Loading optimized industry insights...</div>

    <script>
        // Fetch the programmatic SEO matrix generated by your GitHub Action
        fetch('../seo_updates.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('seo-routes');
                container.innerHTML = '';
                data.optimized_data.suggested_routes.forEach(route => {
                    container.innerHTML += `
                        <div class="card">
                            <span class="badge">${route.industry}</span>
                            <h2>${route.heading}</h2>
                            <p>${route.body_text}</p>
                            <small style="color:#6b7280;">Route: /${route.slug}</small>
                        </div>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('seo-routes').innerHTML = '<p>Data pipeline updating...</p>';
            });
    </script>
</body>
</html>
