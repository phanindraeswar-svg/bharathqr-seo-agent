name: Run SEO Agent Daily
on:
  schedule:
    - cron: '0 2 * * *' # Automatically runs daily at 2 AM IST
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub anytime

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Scraper and AI Dependencies
        run: |
          pip install requests beautifulsoup4 google-generativeai

      - name: Execute SEO Pipeline Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/seo_agent.py

      - name: Commit and Push SEO Updates to Vercel
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add seo_updates.json
          
          # Check if changes were actually made to prevent infinite workflow loops
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-sync competitor SEO updates" && git push origin main)
