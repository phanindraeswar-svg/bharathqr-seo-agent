name: Scheduled Autonomous SEO Agent Pipeline

on:
  schedule:
    # Weekly run: Sunday 2:00 AM IST (Saturday 20:30 UTC). Use workflow_dispatch for manual runs.
    - cron: '30 20 * * 6'
  workflow_dispatch:

jobs:
  run-seo-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialize Target Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Inject Dynamic Automation Dependencies
        run: |
          pip install requests beautifulsoup4 groq

      - name: Process Founder Feedback and Opportunities
        run: |
          python scripts/founder_feedback_agent.py
          python scripts/opportunity_engine.py

      - name: Fire Core Growth Execution Cycle
        run: |
          python scripts/seo_agent.py

      - name: Validate Generated Content
        run: |
          python scripts/validate_content.py
          python scripts/route_audit.py
          python scripts/internal_link_audit.py
          python scripts/content_quality_score.py
          python scripts/final_launch_audit.py

      - name: Commit and Secure Generated SEO Material
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff-index --quiet HEAD --; then
            echo "Zero adjustments reported during this run window. Skipping commit procedures."
          else
            git commit -m "🤖 Autonomous SEO Loop: Synced Content Nodes [skip ci]"
            git pull --rebase origin main || true
            git push origin main || echo "Push skipped due to remote conflict"
          fi
