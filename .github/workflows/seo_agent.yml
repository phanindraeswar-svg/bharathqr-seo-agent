name: BharathQR SEO Agent

on:
  schedule:
    # Runs automatically every day at 2:00 AM IST (20:30 UTC)
    - cron: '30 20 * * *'
  workflow_dispatch:
    # Allows you to trigger the agent manually anytime via a button!

jobs:
  run-seo-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 openai

    - name: Run SEO Automation Script
      run: |
        python scripts/publish_nextjs.py
