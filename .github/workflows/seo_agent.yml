name: BharathQR SEO Agent

on:
  schedule:
    # Runs automatically every day at 2:00 AM IST (20:30 UTC)
    - cron: '30 20 * * *'
  workflow_dispatch:
    # Allows you to trigger the agent manually anytime via a button!

jobs:
  run-seo-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 openai

    - name: Run SEO Automation Script
      run: |
        python scripts/seo_agent.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Automated SEO update: Added new pages" || echo "No changes to commit"
        git push origin main
